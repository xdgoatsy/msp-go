# MathStudyPlatform Nginx 配置
# 将此文件复制到服务器的 /etc/nginx/sites-available/ 目录

# HTTP 配置（如果需要 HTTPS，请使用下面的 HTTPS 配置）
server {
    listen 80;
    listen [::]:80;

    # 替换为你的域名
    server_name your-domain.com www.your-domain.com;

    # 访问日志
    access_log /var/log/nginx/mathstudy_access.log;
    error_log /var/log/nginx/mathstudy_error.log;

    # 前端静态文件代理
    location / {
        proxy_pass http://localhost:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering "no" always;
        gzip off;

        # 增加超时时间（AI 请求可能较慢）
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://localhost:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://localhost:9000/health;
        access_log off;
    }

    # 客户端最大上传大小
    client_max_body_size 10M;
}

